# Fly.io configuration — update `app` to your actual app name after `fly launch`.
# Free tier: 256MB RAM, scale-to-zero.

app = "echonest-yt-proxy"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
